model_list:
  - model_name: copilot-sonnet-4.5
    litellm_params:
      model: github_copilot/claude-sonnet-4.5
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: copilot-gpt-4.1
    litellm_params:
      model: github_copilot/gpt-4.1
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: copilot-gpt-4o
    litellm_params:
      model: github_copilot/gpt-4o
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: copilot-gpt-5
    litellm_params:
      model: github_copilot/gpt-5
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: copilot-gpt-5.1
    litellm_params:
      model: github_copilot/gpt-5.1
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: copilot-gpt-5.1-codex
    model_info:
      mode: responses
    litellm_params:
      model: github_copilot/gpt-5.1-codex
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

  - model_name: copilot-gpt-5.3-codex
    model_info:
      mode: responses
    litellm_params:
      model: github_copilot/gpt-5.3-codex
      extra_headers:
        editor-version: "vscode/1.95.0"
        editor-plugin-version: "copilot-chat/0.26.7"

litellm_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  drop_params: true
  database_url: "os.environ/DATABASE_URL"
